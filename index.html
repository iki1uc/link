<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>36x36 :: 81_81_1</title>
<style>
  body { background:#000; color:#0ff; font-family:monospace; padding:40px; }
  pre { font-size:14px; line-height:14px; }
</style>
</head>
<body>

<h2>36×36 :: Orbit‑Matrix</h2>
<pre id="m"></pre>

<script>
// --- 36x36 Orbit-Matrix ---
function orbit36() {
  let out = "";
  for (let y = 0; y < 36; y++) {
    let row = "";
    for (let x = 0; x < 36; x++) {
      const v = (x * y + 81) % 81;
      row += (v < 10 ? "0" + v : v) + " ";
    }
    out += row + "\n";
  }
  return out;
}

// --- Mandrake Move ---
function mandrake() {
  const tick = Math.floor(Math.random() * 81);
  return `ZACK-KLACK :: 81_81_1 :: ${tick}`;
}

// --- Render ---
function run() {
  const m = document.getElementById("m");
  m.innerText = orbit36() + "\n" + mandrake();
}

run();
</script>

</body>
</html>
