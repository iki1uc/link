<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NC.link 3er Konferenz</title>
</head>
<body style="font-family: monospace; background:#111; color:#0f0;">
    <h1>NC.link 3er Konferenz</h1>

    <pre id="chat"></pre>
    <pre id="nc"></pre>

    <script type="module">
        import { PX } from "./PX.js";
        import { RESPO_SPEAKWRITE } from "./RESPO-SPEAKWRITE.js";
        import { LINK } from "./link.js";

        const px = new PX();
        const respo = new RESPO_SPEAKWRITE();

        const chat = document.getElementById("chat");
        const nc = document.getElementById("nc");

        // NC.link bindet Module
        LINK.bind("px", px);
        LINK.bind("respo", respo);

        // PX aktivieren
        px.setMode("write");

        // Standard Sprecher
        px.setRole(1);

        function speak(role, text) {
            px.setRole(role);
            const pxOut = px.hear(text);

            respo.process(pxOut);

            chat.innerText += `[R${role}] ${text}\n`;
            nc.innerText += LINK.route("speak", { role, text }) + "\n";
        }

        // 3er Konferenz Beispiel
        speak(1, "Hallo, ich bin Sprecher 1.");
        speak(2, "Ich bin Sprecher 2, ich höre euch.");
        speak(3, "Sprecher 3 ist jetzt auch drin.");
        speak(1, "Alles klar, Konferenz läuft.");
    </script>
</body>
</html>
