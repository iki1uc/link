<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>nc.link / JB-Channel</title>
  <style>
    body { font-family: monospace; background:#000; color:#0ff; padding:20px; }
    .box { border:1px solid #0ff; padding:20px; width:340px; margin-bottom:20px; }
    h2 { margin-top:0; }
    hr { border:0; border-top:1px solid #0ff; margin:15px 0; }
  </style>
</head>
<body>

<h2>nc.link / JB‑Channel / Output</h2>

<!-- AUTO -->
<div class="box">
  <h3>nc.auto()</h3>
  <div id="auto_lage"></div>
  <div id="auto_kontext"></div>
  <div id="auto_position"></div>
  <div id="auto_zustand"></div>
  <hr>
  <div id="auto_jb"></div>
</div>

<!-- CHECK -->
<div class="box">
  <h3>nc.check()</h3>
  <div id="check_status"></div>
  <div id="check_raw"></div>
  <div id="check_jb"></div>
</div>

<!-- RAW -->
<div class="box">
  <h3>nc.raw()</h3>
  <div id="raw_out"></div>
</div>

<!-- CHANNEL -->
<div class="box">
  <h3>nc.channel()</h3>
  <div id="channel_out"></div>
</div>

<script>
// ---------------- AUTO ----------------
function genLAGE() {
  const r = ["A", "B", "C", "D"];
  return r[Math.floor(Math.random() * r.length)];
}
function genKONTEXT() {
  const r = ["TEST", "LIVE", "PROD"];
  return r[Math.floor(Math.random() * r.length)];
}
function genPOSITION() {
  return Math.floor(Math.random() * 12) + 1;
}
function genZUSTAND() {
  return [0,1][Math.floor(Math.random()*2)];
}

function JB_AUTO() {
  const L = genLAGE();
  const K = genKONTEXT();
  const P = genPOSITION();
  const Z = genZUSTAND();

  document.getElementById("auto_lage").innerText = "LAGE: " + L;
  document.getElementById("auto_kontext").innerText = "KONTEXT: " + K;
  document.getElementById("auto_position").innerText = "POSITION: " + P;
  document.getElementById("auto_zustand").innerText = "ZUSTAND: " + Z;

  const J = (!L || !K || !P || !Z);
  const B = !J;
  const E = "^";

  document.getElementById("auto_jb").innerText = "JB.auto = (J)" + E + "(B) → " + (B ? "OK" : "FEHLT");
}

// ---------------- CHECK ----------------
function JB_CHECK() {
  const L = "A";
  const K = "LIVE";
  const P = 7;
  const Z = 1;

  const J = (!L || !K || !P || !Z);
  const B = !J;
  const E = "^";

  document.getElementById("check_status").innerText =
    "nc.link STATUS: " + (B ? "index.html OK" : "index.html FEHLT");

  const RAW = P * Z;
  document.getElementById("check_raw").innerText = "RAW: " + RAW;

  document.getElementById("check_jb").innerText = "JB.check = (J)" + E + "(B) → " + (B ? "OK" : "FEHLT");
}

// ---------------- RAW ----------------
function JB_RAW() {
  const P = Math.floor(Math.random()*12)+1;
  const Z = [0,1][Math.floor(Math.random()*2)];
  const RAW = P * Z;

  document.getElementById("raw_out").innerText =
    "nc.raw = POSITION * ZUSTAND → " + RAW;
}

// ---------------- CHANNEL ----------------
function JB_CHANNEL() {
  document.getElementById("channel_out").innerText =
    "nc.channel → JB‑4‑Modul aktiv. Output bereit.";
}

// ---------------- RUN ALL ----------------
JB_AUTO();
JB_CHECK();
JB_RAW();
JB_CHANNEL();
</script>

</body>
</html>
